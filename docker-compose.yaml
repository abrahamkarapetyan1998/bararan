services:
  node:
    image: node:20-alpine
    working_dir: /var/www
    volumes:
      - ./:/var/www
    command: sh -lc "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    volumes:
      - ./:/var/www
      - ./docker/php/conf.ini:/usr/local/etc/php/conf.d/99-custom.ini:ro
    tmpfs:
      - /tmp
    environment:
      TMPDIR: /tmp
      TEMP: /tmp
      TMP: /tmp
      COMPOSER_HOME: /tmp/composer
      COMPOSER_CACHE_DIR: /tmp/composer/cache

    depends_on:
      - db
      - redis
    command: sh -lc 'mkdir -p /tmp/composer/cache && chown -R www-data:www-data /tmp/composer && php-fpm'
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
